<!DOCTYPE html>
<html>
<head>
    <title>Secure Payment</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container mt-5">
    <div class="card shadow p-4 mx-auto" style="max-width: 400px;">

        <h4 class="text-center mb-3">🔒 Secure Payment</h4>

        <p><b>Amount:</b> ₹{{ total }}</p>

        <hr>

        <!-- ✅ FORM START -->
        <form action="/place_order" method="POST">

            <input type="text" class="form-control mb-2" placeholder="Card Number" required>
            <input type="text" class="form-control mb-2" placeholder="MM/YY" required>
            <input type="text" class="form-control mb-3" placeholder="CVV" required>

            <button type="submit" class="btn btn-success w-100" onclick="showLoading()">
                💳 Pay Now
            </button>

        </form>
        <!-- ✅ FORM END -->

        <div id="loading" class="text-center mt-3" style="display:none;">
            ⏳ Processing Payment...
        </div>

    </div>
</div>

<script>
function showLoading() {
    document.getElementById("loading").style.display = "block";
}
</script>

</body>
</html>
