<!DOCTYPE html>
<html>
<head>
    <title>Cart</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container mt-4">

    <h2>🛒 Your Cart</h2>

    <a href="/" class="btn btn-secondary btn-sm mb-3">⬅ Back</a>

    <table class="table table-bordered">
        <tr>
            <th>Product</th>
            <th>Price</th>
            <th>Action</th>
        </tr>

        {% for item in items %}
        <tr>
            <td>{{ item.product_name }}</td>
            <td>₹{{ item.price }}</td>
            <td>
                <a href="/remove_from_cart/{{ item.id }}" class="btn btn-danger btn-sm">
                    Remove
                </a>
            </td>
        </tr>
        {% else %}
        <tr>
            <td colspan="3">Cart is empty</td>
        </tr>
        {% endfor %}
    </table>

    <h4>Total: ₹{{ total }}</h4>

    {% if items %}
        <a href="/place_order" class="btn btn-success">Place Order</a>
    {% endif %}

</div>

</body>
</html>
