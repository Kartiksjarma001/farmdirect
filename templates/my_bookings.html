<h2>📦 My Bookings</h2>
<p>Total bookings: {{ bookings|length }}</p>


{% for b in bookings %}
<div style="border:1px solid black; margin:10px; padding:10px;">
    <p>Product: {{ b.product }}</p>
    <p>Truck ID: {{ b.truck_id }}</p>
    <a href="/track/{{ b.truck_id }}" class="btn btn-success">
        📍 Track Order
        </a>
</div>
{% endfor %}
