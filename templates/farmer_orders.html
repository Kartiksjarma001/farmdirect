<h2>📦 Farmer Orders</h2>

{% if orders %}

    {% for o in orders %}
    <div style="border:1px solid black; padding:10px; margin:10px;">
        
        <p>User: {{ o.user }}</p>
        <p>Product: {{ o.product }}</p>
        <p>Status: {{ o.status }}</p>

        <!-- Accept Button -->
        {% if o.status == "Pending" %}
            <a href="/accept_order/{{ o.id }}" class="btn btn-success">Accept</a>
            <a href="/deliver_order/{{ o.id }}" class="btn btn-success">
    ✅ Mark Delivered
</a>
        {% endif %}

        <!-- Assign Truck -->
        {% if o.status == "Accepted" %}
            <form action="/assign_truck/{{ o.id }}" method="POST">
                
                <select name="truck_id" required>
                    {% for t in trucks %}
                    <option value="{{ t.id }}">
                        Truck {{ t.id }} ({{ t.route_from }} → {{ t.route_to }})
                    </option>
                    {% endfor %}
                </select>

                <button type="submit" class="btn btn-primary mt-2">
                    🚚 Assign Truck
                </button>

            </form>
        {% endif %}

    </div>
    {% endfor %}

{% else %}
    <p>No orders found ❌</p>
{% endif %}
